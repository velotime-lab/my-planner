<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Планер">
<meta name="theme-color" content="#f9f6f0">
<meta name="format-detection" content="telephone=no">
<title>Планер</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{
  --bg:#f9f6f0;--card:#fffefb;--card2:#fff9f0;--bdr:#e8e4db;
  --txt:#1c1c1e;--mut:#8e8e93;--grn:#34c759;--grnd:#2db84e;
  --acc:#007aff;--ln:rgba(0,0,0,0.04);--shd:0 1px 4px rgba(0,0,0,0.06);
  --to1:#fdf6e3;--to2:#faf0d7;--tob:#e0d8bc;
  --row-red:#fee2e2;--row-grn:#dcfce7;
  --cbtn-red:#ef4444;--cbtn-grn:#22c55e;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--card:#2c2c2e;--card2:#3a3a3c;--bdr:#48484a;
    --txt:#f2f2f7;--mut:#98989d;--grn:#30d158;--grnd:#28a745;
    --acc:#0a84ff;--ln:rgba(255,255,255,0.05);--shd:0 1px 4px rgba(0,0,0,0.3);
    --to1:#2a2518;--to2:#2c271a;--tob:#4a4530;
    --row-red:#3d1a1a;--row-grn:#1a3a2a;
    --cbtn-red:#dc2626;--cbtn-grn:#16a34a;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue","Segoe UI",Roboto,sans-serif;background-color:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;min-height:100vh}
.notap{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.grip{touch-action:none;cursor:grab;user-select:none}
.grip:active{cursor:grabbing}
canvas#dc{touch-action:none;image-rendering:auto;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
input[type="text"],input[type="password"]{font-size:16px;background:transparent;color:var(--txt);border:none;outline:none;width:100%}
textarea.fi-area{font-family:inherit;font-size:14px;background:transparent;color:var(--txt);border:none;outline:none;width:100%;resize:none;overflow:hidden;min-height:26px;line-height:1.35;padding:2px 3px;border-radius:5px}
textarea.fi-area:focus{background:rgba(0,122,255,0.06)}
input[type="date"]{font-size:13px;background:transparent;color:var(--mut);border:none;outline:none;width:100%;opacity:.7}
input[type="date"]::-webkit-calendar-picker-indicator{opacity:.4;cursor:pointer}
@media(prefers-color-scheme:dark){input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.3}}
/* toggles */
.tb{height:24px;min-width:30px;padding:0 5px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;transition:all .12s;border:1px solid var(--bdr);background:var(--card);font-size:9px;font-weight:600;color:var(--mut)}
.tb:hover{border-color:var(--grn)}
.tb.off{opacity:.3;background:transparent;border-style:dashed}
.tb.off:hover{opacity:.6}
/* day toggles */
.dtb{display:flex;align-items:center;gap:2px}
.dtb .tb{flex-direction:column;height:26px;min-width:32px}
.dtb .tb .dn{font-size:8px;line-height:1}
.dtb .tb .dt{font-size:10px;font-weight:700;color:var(--txt);line-height:1.1}
/* day header */
.dh{width:32px;min-width:32px;flex-shrink:0;text-align:center;pointer-events:none}
.dh .dn{font-size:8px;font-weight:600;color:var(--mut);line-height:1}
.dh .dt{font-size:11px;font-weight:700;color:var(--txt);line-height:1.2}
/* day cell */
.dc{width:32px;min-width:32px;height:28px;border-radius:7px;border:1.5px solid var(--bdr);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s ease;flex-shrink:0}
.dc:hover{border-color:var(--grn);transform:scale(1.05)}
.dc.on{background:var(--grn)!important;border-color:var(--grnd)!important}
.dc.on::after{content:"";display:block;width:7px;height:4px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px)}
/* task row */
.trow{display:flex;align-items:flex-start;gap:2px;padding:2px 3px;border-radius:8px;transition:background .15s,opacity .15s}
.trow.autored{background:var(--row-red)!important}
.trow.autogrn{background:var(--row-grn)!important}
.trow.mred{background:var(--row-red)!important}
.trow.mgrn{background:var(--row-grn)!important}
.trow.dragging{opacity:.3!important}
.fi{padding:1px 2px;border-radius:4px;min-height:26px}
.fi:focus{background:rgba(0,122,255,0.06)}
.done-gray{opacity:.4}
.drop-ind{height:3px;background:var(--acc);border-radius:2px;margin:1px 0;pointer-events:none}
.cl{font-size:8px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.3px;padding:0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cbtn{width:18px;height:18px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;transition:transform .1s}
.cbtn:hover{transform:scale(1.15)}
.cbtn.sel{border-color:var(--acc);transform:scale(1.15)}
.abtn{width:24px;height:24px;border-radius:6px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:12px;transition:background .12s,transform .1s;background:transparent}
.abtn:hover{background:rgba(0,0,0,0.06)}
.abtn:active{transform:scale(.9)}
.bsz{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--bdr);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s}
.bsz:hover{border-color:var(--acc)}
.bsz.sel{border-color:var(--acc);background:rgba(0,122,255,0.08)}
.bsz-dot{border-radius:50%;background:var(--txt)}
.nb{padding:5px 9px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid var(--bdr);background:var(--card);box-shadow:var(--shd);transition:all .1s}
.nb:hover{border-color:var(--grn)}
.nb.active{background:var(--grn);color:#fff;border-color:var(--grn)}
/* sticky header inside scroll container */
.sticky-hdr{position:-webkit-sticky;position:sticky;top:0;z-index:10;background:var(--card);padding:6px 4px;border-bottom:2px solid var(--bdr);box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.sticky-hdr .dh .dn{font-size:10px;font-weight:700}
.sticky-hdr .dh .dt{font-size:13px;font-weight:800}
.sticky-hdr .cl{font-size:10px;font-weight:800;letter-spacing:.5px;color:var(--txt);opacity:.7}
@media(max-width:640px){
  .dc,.dh{width:26px;min-width:26px}
  .dc{height:24px;border-radius:5px}
  .dc.on::after{width:5px;height:3px}
  .dtb .tb{min-width:26px;height:22px}
  .dtb .tb .dt{font-size:9px}
}
</style>
</head>
<body class="select-none">

<!-- CSV Modal -->
<div id="csv-panel" class="hidden fixed inset-0 z-[95] flex items-center justify-center p-4" style="background:rgba(0,0,0,0.3);backdrop-filter:blur(8px)" onclick="if(event.target===this)this.classList.add('hidden')">
<div class="w-full max-w-lg rounded-2xl p-5 space-y-3" style="background:var(--card);border:1px solid var(--bdr)" onclick="event.stopPropagation()">
<div class="flex justify-between items-center"><h2 class="text-base font-bold">📊 CSV</h2><button onclick="document.getElementById('csv-panel').classList.add('hidden')" class="text-2xl opacity-40 hover:opacity-80 notap" style="line-height:1">&times;</button></div>
<p class="text-xs" style="color:var(--mut)">Столбцы: Описание, Кто, Дата пост., Дата вып., Примечание</p>
<button onclick="CSV.downloadTemplate()" class="w-full py-2 rounded-xl text-sm font-semibold notap" style="background:var(--card2);border:1px solid var(--bdr)">⬇ Скачать шаблон</button>
<textarea id="csv-input" class="w-full rounded-xl px-3 py-2 text-xs" style="border:1px solid var(--bdr);background:var(--card2);color:var(--txt);min-height:100px;font-family:monospace" placeholder="Вставьте CSV..."></textarea>
<div class="flex gap-2">
<select id="csv-target" class="flex-1 rounded-xl px-3 py-2 text-sm" style="border:1px solid var(--bdr);background:var(--card2);color:var(--txt)"><option value="to">→ Чек-листы</option></select>
<button onclick="CSV.import()" class="px-4 py-2 rounded-xl text-white text-sm font-semibold notap" style="background:var(--grn)">Импорт</button>
</div>
<div id="csv-status" class="text-xs text-center" style="color:var(--mut)"></div>
</div></div>

<!-- App -->
<div id="app" class="max-w-[1400px] mx-auto px-1 sm:px-4">

<!-- Nav -->
<div class="flex flex-col items-center gap-1.5 mb-3 pt-3">
<div class="flex items-center gap-1.5 flex-wrap justify-center">
<button onclick="App.prevWeek()" class="nb notap"><svg class="w-3.5 h-3.5 inline" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg><span class="hidden sm:inline"> Прошлая</span></button>
<div class="text-center px-2 min-w-[130px]"><div id="nm" class="text-[10px] uppercase tracking-widest font-semibold" style="color:var(--mut)"></div><div id="nd" class="text-sm font-bold"></div></div>
<button onclick="App.nextWeek()" class="nb notap"><span class="hidden sm:inline">Следующая </span><svg class="w-3.5 h-3.5 inline" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg></button>
<button onclick="App.goToday()" class="nb notap" style="background:var(--grn);color:#fff;border-color:var(--grn)">Сегодня</button>
</div>
<!-- Toggles row -->
<div class="flex items-center gap-1 flex-wrap justify-center">
<div id="day-toggles" class="dtb"></div>
<div style="width:1px;height:16px;background:var(--bdr)"></div>
<div id="col-toggles" class="flex items-center gap-1"></div>
<div style="width:1px;height:16px;background:var(--bdr)"></div>
<button onclick="App.toggleCanvas()" id="canvas-btn" class="tb notap" title="Рисунок">🎨</button>
<button onclick="document.getElementById('csv-panel').classList.remove('hidden');CSV.refreshTargets()" class="tb notap" title="CSV">📊</button>
<button onclick="JSONio.exportFile()" class="tb notap" title="Скачать JSON">💾</button>
<button onclick="document.getElementById('json-file').click()" class="tb notap" title="Загрузить JSON">📂</button>
<input type="file" id="json-file" accept=".json" class="hidden" onchange="JSONio.importFile(this)">
</div>
</div>

<div id="to"></div>
<div id="bl"></div>

<div id="canvas-wrap" class="hidden mt-4">
<div class="rounded-2xl p-3 space-y-2" style="background:var(--card);border:1px solid var(--bdr);box-shadow:var(--shd)">
<div class="flex items-center justify-between flex-wrap gap-2">
<span class="text-sm font-semibold">✏️ Рисунок</span>
<div class="flex items-center gap-1 flex-wrap">
<button onclick="CV.setBrush('#1c1c1e')" id="bb" class="w-6 h-6 rounded-full notap" style="background:#1c1c1e;border:2px solid var(--bdr)"></button>
<button onclick="CV.setBrush('#dc2626')" id="br" class="w-6 h-6 rounded-full notap" style="background:#dc2626;border:2px solid var(--bdr)"></button>
<button onclick="CV.setBrush('#2563eb')" id="blu" class="w-6 h-6 rounded-full notap" style="background:#2563eb;border:2px solid var(--bdr)"></button>
<button onclick="CV.toggleEraser()" id="be" class="w-6 h-6 rounded-full notap flex items-center justify-center text-[10px]" style="background:var(--card);border:2px solid var(--bdr)">🧽</button>
<div style="width:1px;height:18px;background:var(--bdr);margin:0 2px"></div>
<button onclick="CV.setSize(1)" id="bs1" class="bsz" title="Тонкая"><div class="bsz-dot" style="width:3px;height:3px"></div></button>
<button onclick="CV.setSize(3)" id="bs3" class="bsz sel" title="Средняя"><div class="bsz-dot" style="width:7px;height:7px"></div></button>
<button onclick="CV.setSize(6)" id="bs6" class="bsz" title="Толстая"><div class="bsz-dot" style="width:11px;height:11px"></div></button>
<button onclick="CV.setSize(12)" id="bs12" class="bsz" title="Очень толстая"><div class="bsz-dot" style="width:16px;height:16px"></div></button>
<div style="width:1px;height:18px;background:var(--bdr);margin:0 2px"></div>
<button onclick="CV.clear()" class="h-6 px-2 rounded-lg text-[11px] notap" style="background:var(--card2);color:var(--mut)">Очистить</button>
</div></div>
<canvas id="dc" width="1200" height="1200" class="w-full rounded-xl" style="border:1px solid var(--bdr);background:#fff;cursor:crosshair"></canvas>
</div></div>
</div>

<script>
var uid=function(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)};
function pad(n){return String(n).padStart(2,"0")}
function esc(s){if(s==null)s="";var d=document.createElement("div");d.textContent=String(s);return d.innerHTML}
function getMonday(d){var r=new Date(d);r.setHours(0,0,0,0);var w=r.getDay();r.setDate(r.getDate()-w+(w===0?-6:1));return r}
function wKey(d){var m=getMonday(d);return m.getFullYear()+"-"+pad(m.getMonth()+1)+"-"+pad(m.getDate())}
var MRU=["ЯНВАРЬ","ФЕВРАЛЬ","МАРТ","АПРЕЛЬ","МАЙ","ИЮНЬ","ИЮЛЬ","АВГУСТ","СЕНТЯБРЬ","ОКТЯБРЬ","НОЯБРЬ","ДЕКАБРЬ"];
var DN=["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
function todayStr(){var d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())}

/* toggles */
var activeDays=[1,1,1,1,1,0,0];
var showCols={ds:1,dd:1,note:1};
var showCanvasState=0;

function weekDates(){var m=getMonday(curMon);return DN.map(function(_,i){var d=new Date(m);d.setDate(d.getDate()+i);return d})}
function curK(){return wKey(curMon)}
function mkDays(){return[0,0,0,0,0,0,0]}

/* DATA */
var DATA={weeks:{}};
var curMon=getMonday(new Date());

function mkItem(t){return{id:uid(),days:mkDays(),by:"",ds:"",dd:"",text:t||"",note:"",color:""}}
function defaultTO(){return["Полить цветы","Убрать квартиру","Закупить продукты","Оплатить счета","Проверить почту","Стирка","Вынести мусор"].map(function(t){return mkItem(t)})}
function ensureWeek(k){if(!DATA.weeks[k])DATA.weeks[k]={to:defaultTO(),blocks:[],drawing:""};var w=DATA.weeks[k];if(!w.to)w.to=[];if(!w.blocks)w.blocks=[];return w}
function getWeek(k){return ensureWeek(k)}

/* MIGRATION — handles all old formats */
function migItem(it){
  if(!it)return;
  /* days array */
  if(!Array.isArray(it.days)||it.days.length<7){
    var nd=mkDays();
    if(Array.isArray(it.days))for(var i=0;i<Math.min(it.days.length,7);i++)nd[i]=it.days[i]?1:0;
    if(it.checked){for(var j=0;j<7;j++)nd[j]=1;delete it.checked}
    it.days=nd;
  }
  /* convert numeric to proper format */
  for(var d=0;d<it.days.length;d++){if(it.days[d])it.days[d]=1;else it.days[d]=0}
  /* field renames */
  if(it.assignedBy!==undefined){it.by=it.assignedBy;delete it.assignedBy}
  if(it.dateAssigned!==undefined){it.ds=it.dateAssigned;delete it.dateAssigned}
  if(it.dateDue!==undefined){it.dd=it.dateDue;delete it.dateDue}
  /* ensure fields exist */
  if(it.by===undefined||it.by===null)it.by="";
  if(it.ds===undefined||it.ds===null)it.ds="";
  if(it.dd===undefined||it.dd===null)it.dd="";
  if(it.note===undefined||it.note===null)it.note="";
  if(it.text===undefined||it.text===null)it.text="";
  if(it.color===undefined||it.color===null)it.color="";
  /* old color names */
  if(it.color==="pink")it.color="red";
  if(it.color==="yellow")it.color="green";
}
function migData(d){if(!d||!d.weeks)return;try{Object.values(d.weeks).forEach(function(w){if(w.to)w.to.forEach(migItem);if(w.blocks)w.blocks.forEach(function(b){if(b.items)b.items.forEach(migItem)})})}catch(e){}}

/* STORAGE */
function lsSave(){try{localStorage.setItem("planner_d",JSON.stringify(DATA));localStorage.setItem("planner_ad",JSON.stringify(activeDays));localStorage.setItem("planner_sc",JSON.stringify(showCols));localStorage.setItem("planner_cv",showCanvasState?"1":"0")}catch(e){}}
function lsLoad(){try{var d=localStorage.getItem("planner_d");if(d){var p=JSON.parse(d);if(p&&p.weeks)DATA=p}var ad=localStorage.getItem("planner_ad");if(ad){var a=JSON.parse(ad);if(a&&a.length===7)activeDays=a}var sc=localStorage.getItem("planner_sc");if(sc){var s=JSON.parse(sc);if(s){if(s.ds!==undefined)showCols.ds=s.ds;if(s.dd!==undefined)showCols.dd=s.dd;if(s.note!==undefined)showCols.note=s.note}}showCanvasState=localStorage.getItem("planner_cv")==="1"?1:0}catch(e){}}

/* JSON IO */
var JSONio={
  exportFile:function(){var json=JSON.stringify(DATA,null,2);var blob=new Blob([json],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="planner_"+todayStr()+".json";a.click()},
  importFile:function(input){var file=input.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(e){try{var imported=JSON.parse(e.target.result);if(!imported||!imported.weeks){alert("Неверный файл");return}migData(imported);Object.keys(imported.weeks).forEach(function(k){DATA.weeks[k]=imported.weeks[k]});lsSave();Render.all();CV.load();alert("Импортировано! Недель: "+Object.keys(DATA.weeks).length)}catch(err){alert("Ошибка: "+err.message)}};reader.readAsText(file);input.value=""}
};

/* APP */
var App={
  prevWeek:function(){CV.save();curMon=new Date(curMon);curMon.setDate(curMon.getDate()-7);ensureWeek(curK());Render.all();CV.load()},
  nextWeek:function(){CV.save();curMon=new Date(curMon);curMon.setDate(curMon.getDate()+7);ensureWeek(curK());Render.all();CV.load()},
  goToday:function(){CV.save();curMon=getMonday(new Date());ensureWeek(curK());Render.all();CV.load()},
  toggleDayVis:function(i){activeDays[i]=activeDays[i]?0:1;Render.all();lsSave()},
  toggleColVis:function(c){showCols[c]=showCols[c]?0:1;Render.all();lsSave()},
  toggleCanvas:function(){showCanvasState=showCanvasState?0:1;var cw=document.getElementById("canvas-wrap"),btn=document.getElementById("canvas-btn");if(showCanvasState){cw.classList.remove("hidden");btn.classList.add("active")}else{cw.classList.add("hidden");btn.classList.remove("active")}lsSave()},
  addBlock:function(){var w=getWeek(curK());w.blocks.push({id:uid(),title:"Новый блок",collapsed:false,items:[]});Render.blocks();lsSave()},
  delBlock:function(id){var w=getWeek(curK());w.blocks=w.blocks.filter(function(b){return b.id!==id});Render.blocks();lsSave()},
  renameBlock:function(id,v){var w=getWeek(curK()),b=w.blocks.find(function(x){return x.id===id});if(b)b.title=v;lsSave()},
  toggleCollapse:function(id){var w=getWeek(curK()),b=w.blocks.find(function(x){return x.id===id});if(b)b.collapsed=!b.collapsed;Render.blocks();lsSave()},
  addTOItem:function(){var w=getWeek(curK());w.to.push(mkItem(""));Render.to();lsSave();setTimeout(function(){var r=document.querySelectorAll("#to .trow");if(r.length){var inp=r[r.length-1].querySelector("[data-f=text]");if(inp)inp.focus()}},60)},
  delTO:function(id){var w=getWeek(curK());w.to=w.to.filter(function(x){return x.id!==id});Render.to();lsSave()},
  toggleTO:function(id,di){var w=getWeek(curK()),it=w.to.find(function(x){return x.id===id});if(it){it.days[di]=it.days[di]?0:1;Render.to();lsSave()}},
  editTO:function(id,f,v){var w=getWeek(curK()),it=w.to.find(function(x){return x.id===id});if(!it)return;it[f]=v;if(f==="text"&&v&&!it.ds)it.ds=todayStr();lsSave()},
  forwardTO:function(id){var w=getWeek(curK()),it=w.to.find(function(x){return x.id===id});if(!it)return;var nm=new Date(curMon);nm.setDate(nm.getDate()+7);var nw=ensureWeek(wKey(nm));nw.to.push(JSON.parse(JSON.stringify(Object.assign({},it,{id:uid(),days:mkDays()}))));lsSave()},
  setTOColor:function(id,c){var w=getWeek(curK()),it=w.to.find(function(x){return x.id===id});if(!it)return;it.color=(it.color===c)?"":c;Render.to();lsSave()},
  addItem:function(bid){var w=getWeek(curK()),b=w.blocks.find(function(x){return x.id===bid});if(!b)return;b.items.push(mkItem(""));Render.blocks();lsSave();setTimeout(function(){var r=document.querySelectorAll('[data-bid="'+bid+'"] .trow');if(r.length){var inp=r[r.length-1].querySelector("[data-f=text]");if(inp)inp.focus()}},60)},
  delItem:function(bid,id){var w=getWeek(curK()),b=w.blocks.find(function(x){return x.id===bid});if(!b)return;b.items=b.items.filter(function(x){return x.id!==id});Render.blocks();lsSave()},
  toggleDay:function(bid,id,di){var w=getWeek(curK()),b=w.blocks.find(function(x){return x.id===bid});if(!b)return;var it=b.items.find(function(x){return x.id===id});if(it){it.days[di]=it.days[di]?0:1;Render.blocks();lsSave()}},

function init(){
  try{
    setupPWA();lsLoad();migData(DATA);ensureWeek(curK());
    var cw=document.getElementById("canvas-wrap"),cbtn=document.getElementById("canvas-btn");
    if(showCanvasState){cw.classList.remove("hidden");cbtn.classList.add("active")}
    else{cw.classList.add("hidden");cbtn.classList.remove("active")}
    CV.init();Render.all();CV.load();
    setInterval(function(){lsSave()},10000);
  }catch(e){console.error(e)}
}
document.addEventListener("DOMContentLoaded",init);
window.addEventListener("beforeunload",function(){CV.save();lsSave()});
document.addEventListener("visibilitychange",function(){if(document.hidden){CV.save();lsSave()}});
</script>
</body>
</html>
